<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPantry — Interactive Storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background: #1c1a14;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 10px 40px;
  background-image: radial-gradient(ellipse at 20% 50%, #2a2518 0%, #1c1a14 60%);
}

h1.title {
  font-family: 'Playfair Display', serif;
  color: #e8dfc8;
  font-size: 1.6rem;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.subtitle {
  color: #7a7060;
  font-size: 0.75rem;
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── CHAPTER TABS ── */
.chapters {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
  max-width: 860px;
}
.ch-btn {
  background: #2a2518;
  border: 1px solid #3a3528;
  color: #8a8070;
  padding: 7px 16px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
}
.ch-btn:hover { border-color: #8a7a50; color: #c8b880; }
.ch-btn.active { background: #4a3e1a; border-color: #c8a830; color: #f0d060; }

/* ── BOOK WRAPPER ── */
.book-wrapper {
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-arrow {
  width: 44px; height: 44px;
  background: #2a2518;
  border: 1px solid #3a3528;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #8a7a50;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
  user-select: none;
}
.nav-arrow:hover { background: #3a3020; color: #f0d060; border-color: #8a7a50; }
.nav-arrow.disabled { opacity: 0.2; pointer-events: none; }

/* ── BOOK ── */
.book {
  width: 780px;
  max-width: calc(100vw - 120px);
  height: 540px;
  position: relative;
  perspective: 2000px;
}

/* spread = two pages side by side */
.spread {
  width: 100%; height: 100%;
  display: none;
  grid-template-columns: 1fr 1fr;
  box-shadow: 0 30px 80px rgba(0,0,0,.7), 0 0 0 1px #3a3020;
  border-radius: 3px 8px 8px 3px;
}
.spread.active { display: grid; }

/* page */
.page {
  height: 100%;
  overflow: hidden;
  position: relative;
}
.page.left {
  border-right: 2px solid #c8b060;
  border-radius: 3px 0 0 3px;
}
.page.right {
  border-radius: 0 8px 8px 0;
}

/* page inner — all content goes here */
.page-inner {
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: #3a3020 #2a2518;
  padding: 28px 26px 20px;
  display: flex;
  flex-direction: column;
}
.page-inner::-webkit-scrollbar { width: 4px; }
.page-inner::-webkit-scrollbar-track { background: transparent; }
.page-inner::-webkit-scrollbar-thumb { background: #3a3020; }

/* page number */
.page-num {
  position: absolute;
  bottom: 10px;
  font-size: 0.65rem;
  color: #5a5040;
  font-style: italic;
  letter-spacing: 1px;
}
.page.left .page-num { left: 20px; }
.page.right .page-num { right: 20px; }

/* spine shadow */
.page.left::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 20px; height: 100%;
  background: linear-gradient(to left, rgba(0,0,0,.15), transparent);
  pointer-events: none;
}
.page.right::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 20px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,.15), transparent);
  pointer-events: none;
  z-index: 1;
}

/* ── PAGE THEMES ── */
.theme-cover   { background: #2a2010; }
.theme-cream   { background: #faf6ee; }
.theme-sage    { background: #e8f0e4; }
.theme-white   { background: #ffffff; }
.theme-warm    { background: #fdf8f0; }
.theme-dark    { background: #1e2820; }
.theme-amber   { background: #fdf4e0; }

/* ── TYPOGRAPHY ── */
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  color: #1a1a14;
  margin-bottom: 6px;
  line-height: 1.2;
}
.page-title.light { color: #e8dfc8; }
.page-subtitle {
  font-size: 0.68rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #8a7a50;
  margin-bottom: 14px;
  font-weight: 700;
}
.page-subtitle.light { color: #a09070; }
.rule { height: 1px; background: #d0c8a0; margin: 10px 0 14px; opacity: .5; }
.rule.dark { background: #4a5040; opacity: .7; }

p.body-text {
  font-size: 0.8rem;
  line-height: 1.65;
  color: #3a3020;
  margin-bottom: 10px;
}
p.body-text.light { color: #a8b8a0; }

/* ── COVER PAGE ── */
.cover-leaf {
  font-size: 5rem;
  text-align: center;
  margin: 10px 0 6px;
}
.cover-tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: #a09060;
  text-align: center;
  margin-bottom: 16px;
}
.cover-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}
.cover-stat {
  background: rgba(200,168,48,.08);
  border: 1px solid rgba(200,168,48,.2);
  border-radius: 6px;
  padding: 10px 12px;
  text-align: center;
}
.cover-stat .num { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #c8a830; }
.cover-stat .lbl { font-size: 0.62rem; color: #7a6840; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* ── SCREEN MOCKUP (phone inside page) ── */
.phone-mock {
  width: 140px;
  border-radius: 20px;
  border: 2.5px solid #2a2010;
  background: #fff;
  overflow: hidden;
  box-shadow: 4px 8px 24px rgba(0,0,0,.25);
  flex-shrink: 0;
  font-size: 0.6rem;
}
.phone-mock .pm-notch {
  height: 12px; background: #1a1a14; display: flex; align-items: center; justify-content: center;
}
.phone-mock .pm-notch::after { content: ''; width: 32px; height: 5px; background: #0a0a0a; border-radius: 3px; }
.pm-status { display: flex; justify-content: space-between; padding: 4px 8px 2px; font-size: 0.55rem; color: #666; background: #fff; font-weight: 700; }
.pm-content { padding: 0; }

/* hero bar */
.pm-hero { padding: 10px 10px 12px; }
.pm-hero.green { background: linear-gradient(135deg, #3a6b48, #254d30); color: #fff; }
.pm-hero.sage  { background: #e8f0e4; }
.pm-hero.dark  { background: #1e2820; color: #a8c8a0; }
.pm-hero h3 { font-family: 'Playfair Display', serif; font-size: 0.9rem; margin-bottom: 2px; }
.pm-hero p  { font-size: 0.55rem; opacity: .75; }

.pm-stat-row { display: flex; gap: 4px; margin-top: 8px; }
.pm-stat { flex:1; background: rgba(255,255,255,.15); border-radius: 5px; padding: 5px 4px; text-align:center; }
.pm-stat .n { font-size: 0.85rem; font-weight: 700; }
.pm-stat .l { font-size: 0.45rem; opacity: .7; margin-top: 1px; }

/* alert row */
.pm-alert { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #fff8ee; border-bottom: 1px solid #f5e4c0; font-size: 0.6rem; color: #8a5a00; cursor: pointer; }
.pm-alert .badge { background: #e05252; color: #fff; border-radius: 50%; width: 14px; height: 14px; font-size: 0.5rem; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }

/* list row */
.pm-row { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-bottom: 1px solid #f0ebe4; font-size: 0.6rem; color: #2a2010; }
.pm-row .dot-ok  { width: 6px; height: 6px; border-radius: 50%; background: #4a9a5a; flex-shrink:0; }
.pm-row .dot-warn{ width: 6px; height: 6px; border-radius: 50%; background: #e09030; flex-shrink:0; }
.pm-row .dot-bad { width: 6px; height: 6px; border-radius: 50%; background: #e05252; flex-shrink:0; }
.pm-row .ml-auto { margin-left: auto; color: #9a8a70; font-size: 0.5rem; }
.pm-row .tag-green { background: #e0f0e4; color: #2a7a3a; padding: 1px 5px; border-radius: 3px; font-size: 0.5rem; font-weight:700; }
.pm-row .tag-red   { background: #ffeaea; color: #c03030; padding: 1px 5px; border-radius: 3px; font-size: 0.5rem; font-weight:700; }
.pm-row .tag-warn  { background: #fff3e0; color: #c06000; padding: 1px 5px; border-radius: 3px; font-size: 0.5rem; font-weight:700; }

.pm-section { padding: 5px 10px 2px; font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #9a8a70; background: #f8f4ee; }
.pm-btn { margin: 8px 10px; background: #3a6b48; color: #fff; border-radius: 20px; padding: 6px 0; text-align:center; font-size: 0.6rem; font-weight: 700; cursor: pointer; }
.pm-btn.outline { background: transparent; border: 1px solid #3a6b48; color: #3a6b48; }
.pm-input { margin: 6px 10px; background: #f0ebe4; border-radius: 6px; padding: 6px 8px; font-size: 0.6rem; color: #888; }
.pm-tab-bar { display:flex; background:#fff; border-top: 1px solid #eee; padding: 5px 0 6px; margin-top: auto; }
.pm-tab { flex:1; text-align:center; font-size: 0.55rem; color: #aaa; }
.pm-tab.active { color: #3a6b48; font-weight: 700; }
.pm-recipe-scroll { display:flex; gap:6px; padding: 6px 10px; overflow:hidden; }
.pm-recipe-card { width: 60px; background: #fff; border-radius: 7px; overflow:hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); flex-shrink:0; }
.pm-recipe-card .rimg { height: 36px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; background: linear-gradient(135deg,#d8eed0,#b8e0c8); }
.pm-recipe-card .rname { padding: 3px 4px 4px; font-size: 0.45rem; font-weight: 700; color: #2a2010; }

/* scan screen */
.pm-scan-bg { background: #0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 16px 10px; gap: 8px; }
.pm-scan-frame { width: 80px; height: 80px; border: 2px solid #4a9a5a; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-size: 1.6rem; position:relative; overflow:hidden; }
.pm-scan-line { position:absolute; left:0; right:0; height: 1px; background: linear-gradient(90deg, transparent, #4a9a5a, transparent); animation: scanLine 2s ease-in-out infinite; top: 40px; }
@keyframes scanLine { 0%{top:4px} 50%{top:76px} 100%{top:4px} }
.pm-scan-hint { color: rgba(255,255,255,.4); font-size: 0.5rem; text-align:center; }

/* notif */
.pm-notif { display:flex; gap:6px; padding: 6px 10px; border-bottom: 1px solid #f0ebe4; }
.pm-notif-icon { width: 22px; height: 22px; border-radius: 6px; display:flex; align-items:center; justify-content:center; font-size: 0.7rem; flex-shrink:0; }
.pm-notif-title { font-size: 0.58rem; font-weight: 700; color: #2a2010; }
.pm-notif-body { font-size: 0.52rem; color: #7a6840; margin-top:1px; line-height: 1.3; }

/* progress bar */
.pm-progress { padding: 6px 10px; }
.pm-progress-lbl { display:flex; justify-content:space-between; font-size: 0.52rem; color:#7a6840; margin-bottom:3px; }
.pm-progress-track { height: 5px; background: #e8e0d0; border-radius: 50px; }
.pm-progress-fill  { height: 100%; background: #3a6b48; border-radius: 50px; }

/* badge row */
.pm-badge-row { display:flex; gap:5px; padding: 6px 10px; flex-wrap:wrap; }
.pm-badge { background: #fff; border-radius: 6px; padding: 5px 6px; text-align:center; font-size: 0.45rem; color: #7a6840; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.pm-badge span { display:block; font-size: 0.85rem; }

/* ── LAYOUT HELPERS ── */
.two-col { display: flex; gap: 16px; align-items: flex-start; }
.two-col-phone { display: flex; gap: 14px; align-items: flex-start; }
.text-col { flex: 1; }
.phone-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
.phone-caption { font-size: 0.6rem; color: #7a6840; font-style:italic; text-align:center; max-width:140px; }

.flow-step {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 10px;
}
.step-num-circle {
  width: 22px; height: 22px;
  background: #3a6b48;
  border-radius: 50%;
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  display:flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-text strong { font-size: 0.75rem; color: #1a1a14; display:block; margin-bottom:2px; }
.step-text span { font-size: 0.68rem; color: #5a5040; line-height: 1.5; }

.callout {
  background: #f0ede0;
  border-left: 3px solid #c8a830;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  margin: 8px 0;
}
.callout.green { background: #e8f0e4; border-color: #3a6b48; }
.callout.red { background: #fdeaea; border-color: #c03030; }
.callout p { font-size: 0.7rem; color: #3a3020; line-height: 1.5; margin: 0; }
.callout strong { color: #1a1a14; }

.ux-note {
  font-size: 0.65rem;
  color: #7a6840;
  font-style: italic;
  margin-top: 6px;
  line-height: 1.5;
}

.tag-pill {
  display: inline-block;
  background: #e8f0e4;
  color: #3a6b48;
  border-radius: 20px;
  padding: 2px 9px;
  font-size: 0.62rem;
  font-weight: 700;
  margin: 2px 2px;
}
.tag-pill.amber { background: #fef0c0; color: #7a5a00; }
.tag-pill.red { background: #fdeaea; color: #9a2020; }

.screen-title-bar {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #3a6b48;
  background: #e8f0e4;
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 6px;
  display: inline-block;
}
.screen-title-bar.amber { color: #7a5a00; background: #fef0c0; }
.screen-title-bar.red { color: #9a2020; background: #fdeaea; }

/* ── BOTTOM ── */
.page-indicator {
  text-align: center;
  margin-top: 14px;
  font-size: 0.7rem;
  color: #5a5040;
  letter-spacing: 1px;
}
.page-dots {
  display: flex; gap: 6px; justify-content:center; margin-top: 10px;
}
.pdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #3a3020;
  cursor: pointer;
  transition: all .2s;
}
.pdot.active { background: #c8a830; width: 20px; border-radius: 3px; }
</style>
</head>
<body>

<h1 class="title">SmartPantry — Interactive Storyboard</h1>
<p class="subtitle">CS 4800.02 Software Engineering · Proof of Concept Prototype</p>

<div class="chapters" id="chapters"></div>

<div class="book-wrapper">
  <div class="nav-arrow" id="prevBtn" onclick="prevSpread()">‹</div>
  <div class="book" id="book"></div>
  <div class="nav-arrow" id="nextBtn" onclick="nextSpread()">›</div>
</div>

<div class="page-indicator" id="pageIndicator"></div>
<div class="page-dots" id="pageDots"></div>

<script>
// ═══════════════════════════════════════
// ALL SPREADS (each = left + right page)
// ═══════════════════════════════════════
const spreads = [

// ── 0: COVER ──
{
  chapter: "Cover",

    html: `

        <div style="font-size:3.5rem;margin-bottom:10px">🥬</div>
        <div style="font-family:'Playfair Display',serif;font-size:2.2rem;color:#e8dfc8;line-height:1.1;margin-bottom:8px">Smart<br><em style="color:#c8a830">Pantry</em></div>

// ── 1: BUSINESS OVERVIEW ──

      <div style="margin-top:10px">
        ${[
          ["📷","Scan receipts & produce via camera — auto-populates your pantry"],

          ["🛒","Smart shopping lists synced to Instacart & Amazon Fresh"],
          ["📊","Gamified waste-reduction insights & sustainability badges"],
        ].map(([e,t]) => `

          <span style="font-size:0.72rem;font-weight:700;color:#1a1a14;min-width:80px">${s}</span>
          <span style="font-size:0.68rem;color:#5a5040">${d}</span>
        </div>
      `).join('')}
      <div class="ux-note" style="margin-top:10px">All screens prioritize minimal manual input, proactive communication, and closed-loop flows (pantry → recipe → shopping → pantry).</div>
      <div class="page-num">25</div>
    `
  },
  right: {
    theme: "theme-cover",
    html: `
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px">
        <div style="font-size:3rem">🥬</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#e8dfc8;line-height:1.2">Smart<em style="color:#c8a830">Pantry</em></div>
        <div style="height:1px;background:linear-gradient(to right,transparent,#c8a830,transparent);width:60%"></div>
        <p style="font-size:0.72rem;color:#7a6840;line-height:1.6;max-width:180px">"Zero food waste is not a utopian ideal — it's a UX problem."</p>
        <div style="background:rgba(200,168,48,.08);border:1px solid rgba(200,168,48,.2);border-radius:8px;padding:12px 16px;width:100%;max-width:200px">
          <div style="font-size:0.6rem;color:#7a6840;margin-bottom:6px">Project Info</div>
          <div style="font-size:0.65rem;color:#a09060;line-height:1.7">CS 4800.02<br>Software Engineering<br>In-Class Exercise 1<br>Business Plan Prototype</div>
        </div>
      </div>
      <div class="page-num" style="color:#3a3020">26</div>
    `
  }
}

]; // end spreads

// ═══════════════════════════
// BOOK NAVIGATION
// ═══════════════════════════
let current = 0;

function buildBook() {
  const book = document.getElementById('book');
  book.innerHTML = '';
  spreads.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'spread' + (i === 0 ? ' active' : '');
    div.id = 'spread-' + i;
    div.innerHTML = `
      <div class="page left ${s.left.theme}">
        <div class="page-inner">${s.left.html}</div>
      </div>
      <div class="page right ${s.right.theme}">
        <div class="page-inner">${s.right.html}</div>
      </div>
    `;
    book.appendChild(div);
  });
}

function buildChapters() {
  const bar = document.getElementById('chapters');
  spreads.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.chapter;
    btn.onclick = () => goTo(i);
    bar.appendChild(btn);
  });
}

function buildDots() {
  const pd = document.getElementById('pageDots');
  pd.innerHTML = '';
  spreads.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    pd.appendChild(d);
  });
}

function goTo(idx) {
  document.getElementById('spread-' + current).classList.remove('active');
  current = idx;
  document.getElementById('spread-' + current).classList.add('active');
  // update buttons
  document.querySelectorAll('.ch-btn').forEach((b, i) => b.classList.toggle('active', i === current));
  document.querySelectorAll('.pdot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('pageIndicator').textContent = `Spread ${current + 1} of ${spreads.length} — ${spreads[current].chapter}`;
  document.getElementById('prevBtn').classList.toggle('disabled', current === 0);
  document.getElementById('nextBtn').classList.toggle('disabled', current === spreads.length - 1);
  // scroll spreads into view
  document.getElementById('book').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function prevSpread() { if (current > 0) goTo(current - 1); }
function nextSpread() { if (current < spreads.length - 1) goTo(current + 1); }

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSpread();
  if (e.key === 'ArrowLeft') prevSpread();
});

buildBook();
buildChapters();
buildDots();
goTo(0);
</script>
</body>
</html>
